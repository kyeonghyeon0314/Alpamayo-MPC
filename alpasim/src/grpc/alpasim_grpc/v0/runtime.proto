syntax = "proto3";

import "alpasim_grpc/v0/common.proto";

service RuntimeService {
    rpc simulate (SimulationRequest) returns (SimulationReturn);
    rpc shut_down (common.Empty) returns (common.Empty);
}

message RolloutSpec {
    string scenario_id = 1;
    uint32 nr_rollouts = 2;
}

message SimulationRequest {
    message DriverAddress {
        string ip = 1;
        uint32 port = 2;
    }

    repeated DriverAddress available_drivers = 1;
    repeated RolloutSpec rollout_specs = 2; // scenario may be repeated across specs
    uint32 n_concurrent_per_driver = 3;
}

// How per-timestep metric values should be reduced to a single scalar.
enum TimeAggregation {
    TIME_AGGREGATION_UNSPECIFIED = 0;
    TIME_AGGREGATION_MEAN = 1;
    TIME_AGGREGATION_MEDIAN = 2;
    TIME_AGGREGATION_MAX = 3;
    TIME_AGGREGATION_MIN = 4;
    TIME_AGGREGATION_LAST = 5;
}

message SimulationReturn {
    // A single named metric sampled at each simulation timestep.
    message TimestepMetric {
        string name = 1;
        repeated fixed64 timestamps_us = 2;
        repeated double values = 3;
        repeated bool valid = 4;
        TimeAggregation time_aggregation = 5;
    }

    message RolloutReturn {
        RolloutSpec rollout_spec = 1;
        bool success = 2;
        string rollout_uuid = 3;
        string error = 4;
        repeated TimestepMetric timestep_metrics = 5;
        map<string, double> aggregated_metrics = 6;
    }

    common.VersionId runtime_version = 1;
    common.VersionId nre_version = 2;
    common.VersionId physics_version = 3;
    common.VersionId driver_version = 4;
    common.VersionId traffic_version = 5;

    repeated RolloutReturn rollout_returns = 6;
}
